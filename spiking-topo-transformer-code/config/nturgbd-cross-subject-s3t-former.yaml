# S3T-Former Configuration File (NTU RGB+D 60, Cross-Subject)

# Basic Training Configuration
base_lr: 0.01
batch_size: 64
test_batch_size: 128
num_epoch: 250
num_worker: 16
device: [0]
pin_memory: true

# Optimizer Configuration
optimizer: AdamW
optimizer_args:
  adamw_lr: 0.0003
  adamw_weight_decay: 0.0005
  betas: [0.9, 0.999]

# Learning Rate Scheduling
use_cosine_annealing: true
min_lr: 1.0e-06
step: [110, 170, 230]
lr_decay_rate: 0.1

# Training Configuration
eval_interval: 5
save_interval: 1
use_amp: true
max_grad_norm: 0.5

# Model Configuration
model: model.spiking_ssm_topo_transformer.SpikingStateSpaceTopologyTransformer
model_args:
  num_nodes: 25
  in_channels: 3
  embed_dim: 384
  depth: 6
  num_heads: 8
  mlp_ratio: 4.0
  num_classes: 60
  v_threshold: 0.5
  dropout: 0.25
  use_topology_bias: true
  topology_alpha: 0.5
  num_person: 2
  use_temporal_gradient_qkv: true

# Data Loader Configuration
feeder: feeders.feeder_ntus.Feeder

# Training Set Data Configuration
train_feeder_args:
  data_path: /path/to/your/data/NTU60_CS.npz
  label_path: null
  p_interval: [0.5, 1]
  split: train
  window_size: 16
  random_choose: false
  random_shift: false
  random_move: false
  random_rot: false
  normalization: false
  use_mmap: true
  bone: false
  vel: false
  # Data Augmentation
  random_noise: false
  noise_std: 0.02
  random_scale: false
  scale_range: [0.9, 1.1]
  random_mask: false
  mask_ratio: 0.2
  temporal_warp: false
  warp_sigma: 0.2
  warp_knot: 5
  random_flip: false
  flip_prob: 0.25
  gaussian_blur: false
  blur_kernel_size: 3
  blur_sigma: 1.2
  random_dropout_frames: false
  dropout_ratio: 0.25

# Test Set Data Configuration
test_feeder_args:
  data_path: /path/to/your/data/NTU60_CS.npz
  label_path: null
  p_interval: [0.95]
  split: test
  window_size: 16
  random_choose: false
  random_shift: false
  random_move: false
  random_rot: false
  normalization: false
  use_mmap: false
  bone: false
  vel: false
  # Data Augmentation (disabled during testing)
  random_noise: false
  noise_std: 0.01
  random_scale: false
  scale_range: [0.9, 1.1]
  random_mask: false
  mask_ratio: 0.1
  temporal_warp: false
  warp_sigma: 0.2
  warp_knot: 4
  random_flip: false
  flip_prob: 0.5
  gaussian_blur: false
  blur_kernel_size: 3
  blur_sigma: 1.0
  random_dropout_frames: false
  dropout_ratio: 0.1

